{% extends 'base.html '%}
{% load static %}
{% block content %}
	<!-- Main Wrapper -->
		<div class="main-wrapper">
		
			<div class="header-theme header-theme-two">
				<button type="button" id="dark-mode-toggle" class="theme-toggle moon" aria-label="dark mode">
					<i class="isax isax-moon5"></i>
				</button>
				<button type="button" id="light-mode-toggle" class="theme-toggle sun" aria-label="light mode">
					<i class="isax isax-sun-15"></i>
				</button>
			</div>
			
		

			<!-- Breadcrumb -->
			<div class="breadcrumb-bar">
				<div class="container">
					<div class="row align-items-center inner-banner">
						<div class="col-md-12 col-12 text-center">
							<nav aria-label="breadcrumb" class="page-breadcrumb">
								<ol class="breadcrumb">
									<li class="breadcrumb-item"><a href="index.html" aria-label="Home"><i class="isax isax-home-15"></i></a></li>
									<li class="breadcrumb-item active">Contact Us</li>
								</ol>
								<h2 class="breadcrumb-title">Contact Us</h2>
							</nav>
						</div>
					</div>
				</div>
				<div class="breadcrumb-bg">
					<img src="{% static 'assets/img/bg/breadcrumb-bg-01.png' %}" alt="img" class="breadcrumb-bg-01">
					<img src="{% static 'assets/img/bg/breadcrumb-bg-02.png' %}" alt="img" class="breadcrumb-bg-02">
					<img src="{% static 'assets/img/bg/breadcrumb-icon.png' %}" alt="img" class="breadcrumb-bg-03">
					<img src="{% static 'assets/img/bg/breadcrumb-icon.png' %}" alt="img" class="breadcrumb-bg-04">
				</div>
			</div>
			<!-- /Breadcrumb -->

			<!-- Contact Us -->
			<section class="contact-section">
				<div class="container">
					<div class="row">
						<div class="col-lg-5 col-md-12">
							<div class="section-inner-header contact-inner-header">
								<h6>Get in touch</h6>
								<h2>Have Any Question?</h2>
							</div>
							<div class="card contact-card">
								<div class="card-body">
									<div class="contact-icon">
										<i class="isax isax-location5"></i>
									</div>
									<div class="contact-details">
										<h4>Address</h4>
										<p>8432 Mante Highway, Aminaport, USA</p>
									</div>
								</div>
							</div>
							<div class="card contact-card">
								<div class="card-body">
									<div class="contact-icon">
										<i class="isax isax-call5"></i>
									</div>
									<div class="contact-details">
										<h4>Phone Number</h4>
										<p>+1 315 369 5943</p>
									</div>
								</div>
							</div>
							<div class="card contact-card">
								<div class="card-body">
									<div class="contact-icon">
										<i class="isax isax-sms5"></i>
									</div>
									<div class="contact-details">
										<h4>Email Address</h4>
										<p>doccure@example.com</p>
									</div>
								</div>
							</div>
						</div>
						<div class="col-lg-7 col-md-12 d-flex">
							<div class="card contact-form-card w-100">
								<div class="card-body">
									<form action="#">
										<div class="row">
											<div class="col-md-6">
												<div class="mb-3">
													<label class="form-label">Name</label>
													<input type="text" class="form-control" aria-label="Enter your name">
												</div>
											</div>
											<div class="col-md-6">
												<div class="mb-3">
													<label class="form-label">Email</label>
													<input type="text" class="form-control" aria-label="Enter your email address">
												</div>
											</div>
											<div class="col-md-6">
												<div class="mb-3">
													<label class="form-label">Phone Number</label>
													<input type="text" class="form-control" aria-label="Enter your phone number">
												</div>
											</div>
											<div class="col-md-6">
												<div class="mb-3">
													<label class="form-label">Services</label>
													<input type="text" class="form-control" aria-label="Enter services you are interested in">
												</div>
											</div>
											<div class="col-md-12">
												<div class="mb-3">
													<label class="form-label">Message</label>
													<textarea class="form-control" rows="6" aria-label="Enter your message"></textarea>
												</div>
											</div>
											<div class="col-md-12">
												<div class="form-group-btn mb-0">
													<button type="submit" class="btn btn-primary-gradient" aria-label="Send contact message">Send Message</button>
												</div>
											</div>
										</div>
									</form>
								</div>
							</div>
						</div>
					</div>
				</div>
			</section>
			<!-- /Contact Us -->

			<!-- Contact Map -->
			<div class="contact-map d-flex">
				<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3193.7301009561315!2d-76.13077892422932!3d36.82498697224007!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89bae976cfe9f8af%3A0xa61eac05156fbdb9!2sBeachStreet%20USA!5e0!3m2!1sen!2sin!4v1669777904208!5m2!1sen!2sin" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
			</div>
			<!-- /Contact Map -->
   
			
		   
		</div>
		<!-- /Main Wrapper -->

		<!-- start offcanvas -->
		
{% endblock %}
