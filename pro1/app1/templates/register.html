{% extends 'base.html' %}
{% load static %}
{% block content %}

			
			<!-- Page Content -->
			<div class="content">
				<div class="container-fluid">
					
					<div class="row">
						<div class="col-md-8 offset-md-2">
							
							<!-- Login Tab Content -->
							<div class="account-content">
								<div class="row align-items-center justify-content-center">
									<div class="col-md-7 col-lg-6 login-left">
										<img src="{% static 'assets/img/login-banner.png' %}" class="img-fluid" alt="Doccure Login">	
									</div>
									<div class="col-md-12 col-lg-6 login-right">
										<div class="login-header">
											<h3>Patient Register <a href="/docter_Registr/">Are you a Doctor?</a></h3>
										</div>
										<form  method="POST">
											{% csrf_token %}
											<div class="mb-3">
												<label class="form-label">Userr Name</label>
												<input type="text" class="form-control" name="Name">
											</div>
											<div class="mb-3">
												<label class="form-label">First Name</label>
												<input type="text" class="form-control" name="fName">
											</div>
											<div class="mb-3">
												<label class="form-label">Last Name</label>
												<input type="text" class="form-control" name="lName">
											</div>
											<!-- <div class="mb-3">
												<label class="form-label">Phone</label>
												<input class="form-control form-control-lg group_formcontrol form-control-phone" id="phone" name="Phone" type="text">
											</div> -->
                                            	<div class="mb-3">
												<label class="form-label">Email</label>
												<input class="form-control form-control-lg group_formcontrol form-control-phone" id="phone" name="Email" type="text">
											</div>
                                           
											<div class="mb-3">
											        <select name="role" id="role" required>
													<option value="">-- Select Role --</option>
													<option value="doctor">Doctor</option>
													<option value="patient">Patient</option>
													</select>
												
											</div>


											<div class="mb-3">
												<div class="form-group-flex">
													<label class="form-label">Create Password</label>
												</div>
												<div class="pass-group">
													<input type="password" class="form-control pass-input" name="Password">
													<span class="feather-eye-off toggle-password"></span>
												</div>
											</div>
											<div class="mb-3">
												<button class="btn btn-primary-gradient w-100" type="submit">Sign Up</button>
											</div>
											<div class="login-or">
												<span class="or-line"></span>
												<span class="span-or">or</span>
											</div>
										
											<div class="account-signup">
												<p>Already have account? <a href="/login/">Sign In</a></p>
											</div>
										</form>
									</div>
								</div>
							</div>
							<!-- /Login Tab Content -->
								
						</div>
					</div>

				</div>

		
{% endblock %}
